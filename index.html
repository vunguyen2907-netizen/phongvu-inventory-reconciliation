  <!-- Tailwind CSS -->

    tailwind.config = {

            }

  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<body class="min-h-screen bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- SMART EXCEL HEADER & COLUMN MATCHING ---
    const skuCandidates = ['mã sản phẩm', 'mã hàng hóa', 'mã hàng', 'mã sp', 'mã hh', 'mã vật tư', 'mã vt', 'mã thiết bị', 'sku', 'item code', 'product code', 'mã', 'part number', 'part_number', 'mã part'];
    const nameCandidates = ['tên sản phẩm', 'tên hàng hóa', 'tên hàng', 'tên sp', 'tên hh', 'tên vật tư', 'tên thiết bị', 'description', 'product name', 'item name', 'tên'];
    const uomCandidates = ['đơn vị tính', 'đvt', 'uom', 'unit', 'đơn vị'];
    const qtyCandidates = ['số lượng sổ sách', 'tồn cuối', 'số lượng tồn', 'tồn kho', 'tồn sổ sách', 'sl sổ sách', 'sl tồn', 'tồn cuối kỳ', 'số lượng', 'tồn', 'sl', 'thực tế đếm', 'thực tế đã đếm', 'sl thực tế', 'đã đếm'];
    const serialCandidates = ['serial/lot', 'serial đã quét', 'serial đã kiểm', 'số serial', 'serial', 'imei', 'sn', 'seri', 'mã vạch', 'barcode', 'qr', 'mã serial', 'quét', 'chốt', 'series', 'seri no', 'serial no'];
    const partCandidates = ['part number', 'part_number', 'mã part', 'part no', 'part', 'mã phụ tùng'];
    const binCandidates = ['mã bin', 'tên bin', 'bin kiểm đếm', 'bin', 'vị trí', 'khu vực', 'kệ', 'ô kiểm đếm'];
    const typeCandidates = ['loại hàng', 'loại serial', 'loại', 'hàng hóa', 'phân loại'];

    function findVal(row, candidates, defaultVal = "") {
      if (!row) return defaultVal;
      const keys = Object.keys(row);
      for (const cand of candidates) {
        for (const key of keys) {
          if (String(key).trim().toLowerCase().includes(cand)) {
            const val = row[key];
            if (val !== undefined && val !== null && String(val).trim() !== "") {
              return String(val).trim();
            }
          }
        }
      }
      return defaultVal;
    }

    function parseSmartSheet(ws) {
      const rows2d = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      if (!rows2d || rows2d.length === 0) return [];
      
      const headerKeywords = ['mã', 'sku', 'product', 'item', 'tên', 'serial', 'tồn', 'số lượng', 'sl', 'bin', 'đvt'];
      let headerRowIdx = -1;
      
      // Header row MUST have at least 3 non-empty cells across columns
      for (let i = 0; i < Math.min(20, rows2d.length); i++) {
        const rowCells = rows2d[i].map(c => String(c).trim()).filter(c => c !== "");
        if (rowCells.length >= 3) {
          const rowStr = rowCells.map(c => c.toLowerCase()).join(" ");
          if (headerKeywords.some(kw => rowStr.includes(kw))) {
            headerRowIdx = i;
            break;
          }
        }
      }

      if (headerRowIdx === -1) {
        for (let i = 0; i < Math.min(20, rows2d.length); i++) {
          const rowCells = rows2d[i].map(c => String(c).trim()).filter(c => c !== "");
          if (rowCells.length >= 3) {
            headerRowIdx = i;
            break;
          }
        }
      }

      if (headerRowIdx === -1) headerRowIdx = 0;

      const headers = rows2d[headerRowIdx].map(c => String(c).trim());
      const dataRows = [];
      const invalidSkus = ['tổng', 'tổng cộng', 'total', 'nan', 'none', 'null', 'sum', '', 'stt'];

      for (let i = headerRowIdx + 1; i < rows2d.length; i++) {
        const r = rows2d[i];
        if (!r || r.every(cell => String(cell).trim() === "")) continue;
        const obj = {};
        headers.forEach((h, colIdx) => {
          if (h) obj[h] = r[colIdx] !== undefined ? r[colIdx] : "";
        });
        
        const skuVal = findVal(obj, skuCandidates);
        if (skuVal && !invalidSkus.includes(skuVal.toLowerCase())) {
          dataRows.push(obj);
        }
      }
      
      return dataRows;
    }

    function readWorkbookSmart(binaryData) {
      const wb = XLSX.read(binaryData, { type: 'binary' });
      for (const sheetName of wb.SheetNames) {
        const ws = wb.Sheets[sheetName];
        const rows = parseSmartSheet(ws);
        if (rows.length > 0) {
          return rows;
        }
      }
      return [];
    }

    // --- SUPABASE CONFIG ---
    const getSupabaseConfig = () => {
      let url = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || '';
      let key = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY') || '';
      return { url, key };
    };

    let supabaseClient = null;
    const initSupabase = () => {
      const { url, key } = getSupabaseConfig();
      if (url && key) {
        try {
          supabaseClient = supabase.createClient(url, key);
        } catch (e) {
          console.error("Supabase init error:", e);
        }
      }
    };
    initSupabase();

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState(0);
      const [sessionName, setSessionName] = useState(`Kiểm kê ${new Date().toLocaleDateString('vi-VN')}`);
      const [activeSessionId, setActiveSessionId] = useState(null);
      const [lastSavedTime, setLastSavedTime] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [savedSessions, setSavedSessions] = useState([]);
      const [monthlyArchives, setMonthlyArchives] = useState([]);

      // Raw Uploaded Files States
      const [rawStockData, setRawStockData] = useState([]);
      const [rawStockFileName, setRawStockFileName] = useState("");
      const [rawErpData, setRawErpData] = useState([]);
      const [rawErpFileName, setRawErpFileName] = useState("");

      // Processed Data States
      const [dfCountL2, setDfCountL2] = useState([]);
      const [dfCheckDetail, setDfCheckDetail] = useState([]);

      // Modal State for Clearing Surplus Serial
      const [pendingClearSerial, setPendingClearSerial] = useState(null);
      const [clearReasonInput, setClearReasonInput] = useState("");

      // Monthly Archive Form
      const [archiveMonth, setArchiveMonth] = useState(new Date().getMonth() + 1);
      const [archiveYear, setArchiveYear] = useState(new Date().getFullYear());
      const [archiveLabel, setArchiveLabel] = useState("");

      // Filters
      const [filterDetailStatus, setFilterDetailStatus] = useState("Chỉ Serial chênh lệch (Dư / Thiếu)");
      const [searchDetail, setSearchDetail] = useState("");

      const [filterL2Mode, setFilterL2Mode] = useState("Chỉ SKU chênh lệch (Cần xử lý)");
      const [filterL2Status, setFilterL2Status] = useState("Tất cả");
      const [searchL2, setSearchL2] = useState("");

      // Load Supabase sessions list
      const fetchSavedSessions = async () => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .select('id, session_name, created_at, updated_at')
            .order('updated_at', { ascending: false });
          if (!error && data) setSavedSessions(data);
        } catch (e) { console.error(e); }
      };

      const fetchMonthlyArchives = async () => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('monthly_archives')
            .select('id, year_month, created_at, updated_at')
            .order('year_month', { ascending: false });
          if (!error && data) {
            const formatted = data.map(r => {
              const [y, m] = r.year_month.split('-');
              return { ...r, label: `Tháng ${m}/${y}` };
            });
            setMonthlyArchives(formatted);
          }
        } catch (e) { console.error(e); }
      };

      useEffect(() => {
        fetchSavedSessions();
        fetchMonthlyArchives();
      }, []);

      // Auto-save debounce (10s)
      useEffect(() => {
        if (!isDirty || !supabaseClient || dfCheckDetail.length === 0) return;
        const timer = setTimeout(() => {
          handleSaveSession(false);
        }, 10000);
        return () => clearTimeout(timer);
      }, [isDirty, dfCheckDetail, dfCountL2]);

      // --- FILE PARSING & RECONCILIATION ENGINE ---
      const handleProcessFiles = (stockRowsRaw, erpRowsRaw) => {
        if (!stockRowsRaw || stockRowsRaw.length === 0 || !erpRowsRaw || erpRowsRaw.length === 0) {
          alert("Vui lòng tải lên cả 2 file trước khi bấm đối soát!");
          return;
        }

        // Standardize columns using smart candidate matching
        const stockRows = stockRowsRaw.map(r => {
          const sku = findVal(r, skuCandidates);
          const name = findVal(r, nameCandidates, "Chưa có tên");
          const serial = findVal(r, serialCandidates);
          const qty = parseInt(findVal(r, qtyCandidates, "1")) || 1;
          const bin = findVal(r, binCandidates);
          const uom = findVal(r, uomCandidates, "Cái");
          const type = findVal(r, typeCandidates, "Hàng bán");
          return { sku, name, serial, qty, bin, uom, type };
        }).filter(r => r.sku);

        const erpRows = erpRowsRaw.map(r => {
          const sku = findVal(r, skuCandidates);
          const serial = findVal(r, serialCandidates);
          const qty = parseInt(findVal(r, qtyCandidates, "1")) || 1;
          return { sku, serial, qty };
        }).filter(r => r.sku);

        if (stockRows.length === 0 || erpRows.length === 0) {
          alert("Không khớp được cột SKU/Mã sản phẩm trên 2 file. Vui lòng kiểm tra lại file!");
          return;
        }

        // Group ERP serials & quantities
        const erpSerialsBySku = {};
        const erpQtyBySku = {};
        const serialSkusSet = new Set();

        erpRows.forEach(r => {
          if (!erpQtyBySku[r.sku]) erpQtyBySku[r.sku] = 0;
          erpQtyBySku[r.sku] += r.qty;
          if (r.serial) {
            serialSkusSet.add(r.sku);
            if (!erpSerialsBySku[r.sku]) erpSerialsBySku[r.sku] = [];
            erpSerialsBySku[r.sku].push(r.serial);
          }
        });

        stockRows.forEach(r => {
          if (r.serial) serialSkusSet.add(r.sku);
        });

        // Build dfCountL2
        const stockQtyBySku = {};
        const stockNameBySku = {};
        const stockUomBySku = {};

        stockRows.forEach(r => {
          if (!stockQtyBySku[r.sku]) {
            stockQtyBySku[r.sku] = 0;
            stockNameBySku[r.sku] = r.name;
            stockUomBySku[r.sku] = r.uom;
          }
          stockQtyBySku[r.sku] += r.qty;
        });

        const allSkus = Array.from(new Set([...Object.keys(stockQtyBySku), ...Object.keys(erpQtyBySku)]));

        const countL2Data = allSkus.map(sku => {
          const name = stockNameBySku[sku] || "Sản phẩm mới chưa có trong danh mục";
          const uom = stockUomBySku[sku] || "Cái";
          const qtySys = stockQtyBySku[sku] || 0;
          let qtyL1 = 0;
          if (serialSkusSet.has(sku)) {
            qtyL1 = (erpSerialsBySku[sku] || []).length;
          } else {
            qtyL1 = erpQtyBySku[sku] || 0;
          }
          return {
            sku,
            name,
            uom,
            qtySys,
            qtyL1,
            qtyL2: 0,
            diffL2: qtyL1 - qtySys,
            totalActual: qtyL1,
            note: ""
          };
        });

        // Build Detail Serial Rows
        const detailRows = [];
        const stockRowsBySku = {};

        stockRows.forEach(r => {
          if (!stockRowsBySku[r.sku]) stockRowsBySku[r.sku] = [];
          const isNonSerial = !serialSkusSet.has(r.sku);
          stockRowsBySku[r.sku].push({
            sku: r.sku,
            name: r.name,
            uom: r.uom,
            qty: isNonSerial ? r.qty : 1,
            stockSerial: isNonSerial ? "(Hàng không serial)" : r.serial,
            scannedSerial: "",
            bin: r.bin,
            type: isNonSerial ? "Hàng không serial" : r.type,
            checked: 0,
            diff: -(isNonSerial ? r.qty : 1),
            status: "Bắn thiếu (Chưa quét)",
            note: "",
            isNonSerial
          });
        });

        allSkus.forEach(sku => {
          const sRows = stockRowsBySku[sku] || [];
          const isSerial = serialSkusSet.has(sku);

          if (!isSerial) {
            const totalErp = erpQtyBySku[sku] || 0;
            let remErp = totalErp;
            sRows.forEach((r, idx) => {
              const sysQ = r.qty;
              let alloc = remErp >= sysQ ? sysQ : remErp;
              remErp -= alloc;
              if (idx === sRows.length - 1 && remErp > 0) {
                alloc += remErp;
                remErp = 0;
              }
              const diffQ = alloc - sysQ;
              detailRows.push({
                ...r,
                scannedSerial: alloc > 0 ? `${alloc} cái` : "0 cái",
                checked: alloc,
                diff: diffQ,
                status: diffQ === 0 ? `Đã đếm đủ (${alloc}/${sysQ})` : (diffQ < 0 ? `Bắn thiếu ${Math.abs(diffQ)} hàng` : `Bắn thừa ${diffQ} hàng`)
              });
            });
            if (sRows.length === 0 && totalErp > 0) {
              detailRows.push({
                sku, name: "Sản phẩm không serial chưa có trong danh mục", uom: "Cái", qty: 0,
                stockSerial: "(Hàng không serial)", scannedSerial: `Đã đếm: ${totalErp}`, bin: "",
                type: "Không có tồn hệ thống", checked: totalErp, diff: totalErp, status: `Bắn thừa hàng ${totalErp}`, note: ""
              });
            }
          } else {
            const eSerials = [...(erpSerialsBySku[sku] || [])];
            
            // 1. Exact match
            sRows.forEach(r => {
              if (r.stockSerial && eSerials.includes(r.stockSerial)) {
                r.scannedSerial = r.stockSerial;
                r.checked = 1;
                r.diff = 0;
                r.status = "Đã quét đủ";
                const idx = eSerials.indexOf(r.stockSerial);
                eSerials.splice(idx, 1);
              }
            });

            // 2. Pair unmatched scanned serials with missing book rows -> Bắn sai serial!
            sRows.forEach(r => {
              if (r.checked === 0) {
                if (eSerials.length > 0) {
                  const wrongSer = eSerials.shift();
                  r.scannedSerial = wrongSer;
                  r.checked = 1;
                  r.diff = 0;
                  r.status = "Bắn sai serial";
                } else {
                  r.scannedSerial = "";
                  r.checked = 0;
                  r.diff = -1;
                  r.status = "Bắn thiếu (Chưa quét)";
                }
              }
              detailRows.push(r);
            });

            // 3. Extra scanned serials -> Bắn dư serial
            if (eSerials.length > 0) {
              const firstName = sRows.length > 0 ? sRows[0].name : "Sản phẩm quét dư / chưa có trong danh mục";
              const firstUom = sRows.length > 0 ? sRows[0].uom : "Cái";
              eSerials.forEach(extraSer => {
                detailRows.push({
                  sku, name: firstName, uom: firstUom, qty: 1, stockSerial: "", scannedSerial: extraSer, bin: "",
                  type: sRows.length > 0 ? "Bắn dư serial" : "Không có tồn hệ thống", checked: 1, diff: 1, status: "Bắn dư serial", note: ""
                });
              });
            }
          }
        });

        setDfCountL2(countL2Data);
        setDfCheckDetail(detailRows);
        setIsDirty(true);
        setActiveTab(1); // Auto switch to Tab 2
      };

      // --- SAVE & LOAD SESSIONS ---
      const handleSaveSession = async (showNotice = true) => {
        if (!supabaseClient || dfCheckDetail.length === 0) return;
        try {
          const payload = {
            df_count_l2: dfCountL2,
            df_check_detail: dfCheckDetail,
          };
          const rowData = {
            session_name: sessionName.trim() || "Đợt kiểm kê chưa đặt tên",
            data: payload
          };
          if (activeSessionId) rowData.id = activeSessionId;

          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .upsert(rowData)
            .select();

          if (!error && data && data.length > 0) {
            setActiveSessionId(data[0].id);
            setLastSavedTime(new Date().toLocaleTimeString('vi-VN'));
            setIsDirty(false);
            fetchSavedSessions();
            if (showNotice) alert("✅ Đã lưu thành công đợt kiểm kê lên Supabase!");
          }
        } catch (e) { alert("Lỗi khi lưu Supabase: " + e.message); }
      };

      const handleLoadSession = async (id) => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .select('*')
            .eq('id', id)
            .single();

          if (!error && data) {
            const p = data.data || {};
            setDfCountL2(p.df_count_l2 || []);
            setDfCheckDetail(p.df_check_detail || []);
            setActiveSessionId(data.id);
            setSessionName(data.session_name || '');
            setLastSavedTime(new Date(data.updated_at).toLocaleTimeString('vi-VN'));
            setIsDirty(false);
          }
        } catch (e) { alert("Lỗi tải đợt kiểm kê: " + e.message); }
      };

      // --- MONTHLY ARCHIVE SAVE ---
      const handleSaveMonthlyArchive = async () => {
        if (!supabaseClient || dfCountL2.length === 0) return;
        try {
          const ym = `${archiveYear}-${String(archiveMonth).padStart(2, '0')}`;
          let label = `Tháng ${String(archiveMonth).padStart(2, '0')}/${archiveYear}`;
          if (archiveLabel.trim()) label += ` — ${archiveLabel.trim()}`;

          const summaryData = dfCountL2.map(r => ({
            SKU: r.sku,
            'Tên hàng hóa': r.name,
            'ĐVT': r.uom,
            'Số lượng sổ sách': r.qtySys,
            'Số lượng thực tế': r.totalActual,
            'Chênh lệch': r.totalActual - r.qtySys
          }));

          const payload = {
            year_month: ym,
            summary: { data: summaryData, _label: label },
            df_count_l2: dfCountL2,
            df_detail: dfCheckDetail
          };

          const { error } = await supabaseClient
            .from('monthly_archives')
            .upsert(payload, { onConflict: 'year_month' });

          if (!error) {
            alert(`✅ Đã lưu báo cáo ${label} thành công!`);
            fetchMonthlyArchives();
          } else {
            alert("Lỗi lưu archive: " + error.message);
          }
        } catch (e) { alert("Lỗi: " + e.message); }
      };

      // --- INLINE EDITING HANDLERS (0ms REACTIVITY) ---
      const handleL2QtyChange = (sku, val) => {
        const num = parseInt(val) || 0;
        setDfCountL2(prev => prev.map(r => {
          if (r.sku === sku) {
            const totalActual = r.qtyL1 + num;
            const diffL2 = totalActual - r.qtySys;
            return { ...r, qtyL2: num, totalActual, diffL2 };
          }
          return r;
        }));
        setIsDirty(true);
      };

      const handleL2NoteChange = (sku, note) => {
        setDfCountL2(prev => prev.map(r => r.sku === sku ? { ...r, note } : r));
        setIsDirty(true);
      };

      const handleSerialEdit = (idx, newSerial) => {
        setDfCheckDetail(prev => {
          const updated = [...prev];
          const row = updated[idx];
          const oldSerial = row.scannedSerial;
          if (newSerial === "" && (row.status === "Bắn dư serial" || oldSerial !== "")) {
            setPendingClearSerial({ idx, sku: row.sku, serial: oldSerial });
            return prev;
          }
          row.scannedSerial = newSerial;
          row.checked = newSerial ? 1 : 0;
          row.diff = newSerial ? 0 : -1;
          row.status = newSerial ? "Đã sửa Serial (Lần 2)" : "Bắn thiếu (Chưa quét)";
          row.note = `${row.note} [Sửa Serial: ${oldSerial} -> ${newSerial}]`.trim();
          return updated;
        });
        setIsDirty(true);
      };

      const confirmClearSurplusSerial = () => {
        if (!clearReasonInput.trim() || !pendingClearSerial) {
          alert("Vui lòng nhập lý do loại bỏ!");
          return;
        }
        const { idx, sku, serial } = pendingClearSerial;
        setDfCheckDetail(prev => {
          const updated = [...prev];
          const r = updated[idx];
          r.scannedSerial = "";
          r.checked = 0;
          r.diff = 0;
          r.status = "Đã loại bỏ Serial dư";
          r.note = `[Đã loại bỏ Serial dư ${serial} - Lý do: ${clearReasonInput.trim()}]`;
          return updated;
        });

        // Reduce L1 count in L2 table if needed

              {/* TAB 1: CHI TIẾT SERIAL */}
              {activeTab === 1 && (

                        className="bg-slate-50 text-xs border border-slate-300 rounded-lg px-3 py-2 font-medium"
                      >
                        {["Tất cả", "Lệch chưa đếm bù", "Đã nhập đếm bù Lần 2", "Đã khớp sau đếm bù"].map(s => (
                          <option key={s} value={s}>{s}</option>
                        ))}
                      </select>
                    </div>

                    <input
                      type="text"
                      placeholder="🔍 Tìm Mã / Tên vật tư..."
                      value={searchL2}
                      onChange={e => setSearchL2(e.target.value)}
                      className="bg-slate-50 text-xs border border-slate-300 rounded-lg px-3 py-2 w-64"
                    />
                  </div>

                  {/* L2 GRID TABLE */}
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="overflow-x-auto max-h-[600px]">
                      <table className="w-full text-left text-xs">
                        <thead className="bg-slate-100 text-slate-700 font-bold sticky top-0 border-b border-slate-200">
                          <tr>
                            <th className="p-3">Mã vật tư</th>
                            <th className="p-3">Tên vật tư</th>
                            <th className="p-3 text-center">ĐVT</th>
                            <th className="p-3 text-center">Sổ sách (A)</th>
                            <th className="p-3 text-center">Thực tế L1 (B)</th>
                            <th className="p-3 text-center bg-brand-50 text-brand-700">Đếm lại Lần 2 (C) - Sửa 0ms</th>
                            <th className="p-3 text-center font-bold">Tổng thực tế (B+C)</th>
                            <th className="p-3 text-center font-bold">Chênh lệch Lần 2</th>
                            <th className="p-3">Note mã đơn xuất / Lý do</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {filteredL2Rows.map((r, i) => {
                            const isMatch = r.diffL2 === 0;
                            return (
                              <tr key={i} className="hover:bg-slate-50 transition">
                                <td className="p-3 font-mono font-medium">{r.sku}</td>
                                <td className="p-3 max-w-xs truncate">{r.name}</td>
                                <td className="p-3 text-center text-slate-500">{r.uom}</td>
                                <td className="p-3 text-center font-semibold text-slate-700">{r.qtySys}</td>
                                <td className="p-3 text-center font-semibold text-slate-700">{r.qtyL1}</td>
                                <td className="p-2 bg-brand-50/30">
                                  <input
                                    type="number"
                                    min="0"
                                    value={r.qtyL2}
                                    onChange={e => handleL2QtyChange(r.sku, e.target.value)}
                                    className="w-24 mx-auto block text-center bg-white border border-brand-300 focus:border-brand-600 rounded px-2 py-1 font-bold text-brand-700 text-xs shadow-sm"
                                  />
                                </td>
                                <td className="p-3 text-center font-bold text-slate-900 bg-slate-50">{r.totalActual}</td>
                                <td className={`p-3 text-center font-bold text-xs ${isMatch ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50'}`}>
                                  {r.diffL2 > 0 ? `+${r.diffL2}` : r.diffL2}
                                </td>
                                <td className="p-2">
                                  <input
                                    type="text"
                                    value={r.note}
                                    onChange={e => handleL2NoteChange(r.sku, e.target.value)}
                                    className="w-full bg-slate-50 focus:bg-white border border-slate-200 rounded px-2 py-1 text-xs"
                                    placeholder="Nhập lý do..."
                                  />
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB 3: BẢNG TỔNG HỢP CHÊNH LỆCH */}
              {activeTab === 3 && (
                <div className="space-y-4">
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-center">
                    <h3 className="text-lg font-bold text-slate-800">Bảng Tổng Hợp Chênh Lệch & Phân Loại Lỗi</h3>
                    <p className="text-xs text-slate-500 mt-1">Đã tự động tính toán 0ms dựa trên kết quả đếm Lần 2 & Chi tiết Serial.</p>
                  </div>
                </div>
              )}

              {/* TAB 4: XUẤT BÁO CÁO */}
              {activeTab === 4 && (
                <div className="space-y-6 max-w-3xl mx-auto">
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                    <h3 className="text-base font-bold text-slate-800">Xuất báo cáo & Biên bản kiểm kê Phong Vũ</h3>
                    <button
                      onClick={handleExportExcel}
                      className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm rounded-xl shadow-lg transition"
                    >
                      📥 Tải xuống File Báo cáo Excel Đầy đủ (3 Sheets)
                    </button>
                  </div>
                </div>
              )}

              {/* TAB 5: LƯU TRỮ HÀNG THÁNG */}
              {activeTab === 5 && (
                <div className="space-y-4 max-w-4xl mx-auto">
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 className="text-base font-bold text-slate-800 mb-2">📅 Danh sách Báo cáo Hàng tháng (Rolling 12 tháng)</h3>
                    <p className="text-xs text-slate-500 mb-4">Lưu trữ snapshot báo cáo tổng hợp cuối tháng trên Supabase. Tự động giữ 12 tháng gần nhất.</p>

                    <div className="space-y-2">
                      {monthlyArchives.map(a => (
                        <div key={a.id} className="p-3 bg-slate-50 border border-slate-200 rounded-lg flex justify-between items-center">
                          <div>
                            <h4 className="font-bold text-sm text-slate-800">{a.label}</h4>
                            <p className="text-xs text-slate-400">Cập nhật: {new Date(a.updated_at).toLocaleString('vi-VN')}</p>
                          </div>
                          <button
                            onClick={() => alert(`Đang tải báo cáo tháng ${a.label}...`)}
                            className="px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold rounded-md shadow-sm transition"
                          >
                            Tải báo cáo
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* CLEAR SURPLUS SERIAL MODAL */}
          {pendingClearSerial && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl space-y-4">
                <h3 className="text-base font-bold text-slate-900">Lý Do Loại Bỏ Serial Bắn Dư Khỏi Báo Cáo</h3>
                <p className="text-xs text-slate-600">
                  Bạn đang yêu cầu **loại bỏ Serial bắn dư `{pendingClearSerial.serial}`** của SKU **`{pendingClearSerial.sku}`** khỏi Báo cáo Tổng hợp hàng hóa.
                </p>
                <input
                  type="text"
                  placeholder="Ví dụ: Quét nhầm, hàng mẫu, hủy đơn xuất..."
                  value={clearReasonInput}
                  onChange={e => setClearReasonInput(e.target.value)}
                  className="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 text-xs focus:outline-none focus:border-brand-500"
                />
                <div className="flex gap-3 pt-2">
                  <button
                    onClick={confirmClearSurplusSerial}
                    className="flex-1 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs rounded-xl shadow-md transition"
                  >
                    Xác nhận loại bỏ khỏi Báo cáo
                  </button>
                  <button
                    onClick={() => setPendingClearSerial(null)}
                    className="py-2.5 px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold text-xs rounded-xl transition"
                  >
                    Hủy
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
