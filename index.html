  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<body class="min-h-screen bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- CANDIDATES SEARCH ---
    const skuCandidates = ['mã sản phẩm', 'mã hàng hóa', 'mã hàng', 'mã sp', 'mã hh', 'mã vật tư', 'mã vt', 'mã thiết bị', 'sku', 'item code', 'product code', 'part number', 'mã'];
    const nameCandidates = ['tên sản phẩm', 'tên hàng hóa', 'tên hàng', 'tên sp', 'tên hh', 'tên vật tư', 'tên thiết bị', 'description', 'product name', 'item name', 'tên'];
    const uomCandidates = ['đơn vị tính', 'đvt', 'uom', 'unit', 'đơn vị'];
    const qtyCandidates = ['số lượng kiểm đếm', 'thực tế đếm', 'số lượng thực tế', 'sl kiểm đếm', 'thực tế đã đếm', 'sl thực tế', 'số lượng sổ sách', 'tồn cuối', 'số lượng tồn', 'tồn kho', 'tồn sổ sách', 'sl sổ sách', 'sl tồn', 'tồn cuối kỳ', 'số lượng', 'tồn', 'sl', 'đã đếm'];
    const serialCandidates = ['số serial', 'serial/lot', 'serial đã quét', 'serial đã kiểm', 'mã serial', 'số seri', 'serial no', 'seri no', 'serial', 'imei', 'sn', 'barcode'];
    const partCandidates = ['part number', 'part_number', 'mã part', 'part no', 'part', 'mã phụ tùng'];
    const binCandidates = ['bin kiểm đếm', 'mã bin', 'tên bin', 'bin', 'vị trí', 'khu vực', 'kệ', 'ô kiểm đếm'];
    const typeCandidates = ['loại hàng', 'loại serial', 'loại', 'hàng hóa', 'phân loại'];

    function findVal(row, candidates, defaultVal = "", excludeList = []) {
      if (!row) return defaultVal;
      const keys = Object.keys(row);
      for (const cand of candidates) {
        for (const key of keys) {
          const cleanKey = String(key).trim().toLowerCase();
          if (cleanKey === 'stt' || cleanKey === 'stt.' || cleanKey === 'no' || cleanKey === 'no.') continue;
          if (excludeList.some(ex => cleanKey.includes(ex))) continue;
          
          if (cleanKey.includes(cand)) {
            const val = row[key];
            if (val !== undefined && val !== null && String(val).trim() !== "") {
              return String(val).trim();
            }
          }
        }
      }
      return defaultVal;
    }

    // --- PYTHON-EQUIVALENT MAXIMUM SCORE HEADER DETECTOR ---
    function parseSmartSheet(ws) {
      const rows2d = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      if (!rows2d || rows2d.length === 0) return [];
      
      const headerKeywords = ['mã', 'sku', 'tên', 'tồn', 'số lượng', 'sl', 'serial', 'chênh lệch', 'đvt', 'hàng hóa', 'sản phẩm', 'stt', 'đơn vị', 'part', 'bin'];
      let bestRowIdx = 0;
      let maxScore = -1;
      
      for (let i = 0; i < Math.min(30, rows2d.length); i++) {
        const rowCells = rows2d[i].map(c => String(c).trim()).filter(c => c !== "");
        const rowCellsLower = rowCells.map(c => c.toLowerCase());
        const distinctCells = new Set(rowCellsLower);
        
        if (distinctCells.size < 3) continue;
        
        let score = 0;
        distinctCells.forEach(cell => {
          if (headerKeywords.some(kw => cell.includes(kw))) {
            score++;
          }
        });
        
        if (score > maxScore) {
          maxScore = score;
          bestRowIdx = i;
        }
      }

      const headersRaw = rows2d[bestRowIdx].map(c => String(c).trim());
      const seen = {};
      const cleanHeaders = [];
      
      headersRaw.forEach((h, i) => {
        const base = h || `Unnamed_${i}`;
        if (seen[base] !== undefined) {
          seen[base]++;
          cleanHeaders.push(`${base}_${seen[base]}`);
        } else {
          seen[base] = 0;
          cleanHeaders.push(base);
        }
      });

      const dataRows = [];
      const invalidSkus = ['tổng', 'tổng cộng', 'total', 'nan', 'none', 'null', 'sum', '', 'stt', 'stt.'];

      for (let i = bestRowIdx + 1; i < rows2d.length; i++) {
        const r = rows2d[i];
        if (!r || r.every(cell => String(cell).trim() === "")) continue;
        const obj = {};
        cleanHeaders.forEach((h, colIdx) => {
          if (h) obj[h] = r[colIdx] !== undefined ? r[colIdx] : "";
        });
        
        let skuVal = findVal(obj, skuCandidates);
        
        if (!skuVal) {
          for (const h of cleanHeaders) {
            const hLower = h.toLowerCase();
            if (hLower === 'stt' || hLower === 'stt.' || hLower === 'no') continue;
            const val = String(obj[h] || '').trim();
            if (val && !invalidSkus.includes(val.toLowerCase())) {
              skuVal = val;
              break;
            }
          }
        }

        if (skuVal && !invalidSkus.includes(skuVal.toLowerCase())) {
          dataRows.push(obj);
        }
      }
      
      return dataRows;
    }

    function readWorkbookSmart(arrayBuffer, isErp = false) {
      const data = new Uint8Array(arrayBuffer);
      const wb = XLSX.read(data, { type: 'array' });
      
      if (isErp) {
        const targetSheetName = wb.SheetNames.find(s => {
          const sLower = s.toLowerCase();
          return sLower.includes('ketquachitiet') || sLower.includes('chitiet') || sLower.includes('detail');
        }) || (wb.SheetNames.length > 1 ? wb.SheetNames[1] : wb.SheetNames[0]);
        
        if (targetSheetName && wb.Sheets[targetSheetName]) {
          const rows = parseSmartSheet(wb.Sheets[targetSheetName]);
          if (rows.length > 0) return rows;
        }
      }

      for (const sheetName of wb.SheetNames) {
        const ws = wb.Sheets[sheetName];
        const rows = parseSmartSheet(ws);
        if (rows.length > 0) {
          return rows;
        }
      }
      return [];
    }

    // --- SUPABASE CONFIG ---
    const getSupabaseConfig = () => {
      let url = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || '';
      let key = window.SUPABASE_KEY || localStorage.getItem('SUPABASE_KEY') || '';
      return { url, key };
    };

    let supabaseClient = null;
    const initSupabase = () => {
      const { url, key } = getSupabaseConfig();
      if (url && key) {
        try {
          supabaseClient = supabase.createClient(url, key);
        } catch (e) { console.error("Supabase init error:", e); }
      }
    };
    initSupabase();

    // --- MAIN REACT SPA COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState(0);
      const [sessionName, setSessionName] = useState(`Kiểm kê ${new Date().toLocaleDateString('vi-VN')}`);
      const [activeSessionId, setActiveSessionId] = useState(null);
      const [lastSavedTime, setLastSavedTime] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [savedSessions, setSavedSessions] = useState([]);
      const [monthlyArchives, setMonthlyArchives] = useState([]);

      // Raw Uploaded Files States
      const [rawStockData, setRawStockData] = useState([]);
      const [rawStockFileName, setRawStockFileName] = useState("");
      const [rawErpData, setRawErpData] = useState([]);
      const [rawErpFileName, setRawErpFileName] = useState("");

      // Processed Data States
      const [dfCountL2, setDfCountL2] = useState([]);
      const [dfCheckDetail, setDfCheckDetail] = useState([]);

      // Export Metadata State
      const [reportDate, setReportDate] = useState(new Date().toISOString().slice(0, 10));
      const [locationName, setLocationName] = useState("CP74 - KHÁNH HỘI | Địa chỉ: 162 - 164 Khánh Hội, Phường Khánh Hội, TPHCM");
      const [mgrName, setMgrName] = useState("Nguyễn Tuấn Vũ");
      const [staffName, setStaffName] = useState("Nguyễn Xuân Lộc");

      // Modal State for Clearing Surplus Serial
      const [pendingClearSerial, setPendingClearSerial] = useState(null);
      const [clearReasonInput, setClearReasonInput] = useState("");

      // Monthly Archive Form
      const [archiveMonth, setArchiveMonth] = useState(new Date().getMonth() + 1);
      const [archiveYear, setArchiveYear] = useState(new Date().getFullYear());
      const [archiveLabel, setArchiveLabel] = useState("");

      // Filters
      const [filterDetailStatus, setFilterDetailStatus] = useState("Chỉ Serial chênh lệch (Dư / Thiếu)");
      const [searchDetail, setSearchDetail] = useState("");

      const [filterL2Mode, setFilterL2Mode] = useState("Chỉ SKU chênh lệch (Cần xử lý)");
      const [filterL2Status, setFilterL2Status] = useState("Tất cả");
      const [searchL2, setSearchL2] = useState("");

      const [filterMainMode, setFilterMainMode] = useState("Chỉ SKU chênh lệch / Sai lý do (Cần xử lý)");
      const [filterMainStatus, setFilterMainStatus] = useState("Tất cả");
      const [searchMain, setSearchMain] = useState("");

      // Supabase fetch
      const fetchSavedSessions = async () => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .select('id, session_name, created_at, updated_at')
            .order('updated_at', { ascending: false });
          if (!error && data) setSavedSessions(data);
        } catch (e) { console.error(e); }
      };

      const fetchMonthlyArchives = async () => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('monthly_archives')
            .select('id, year_month, created_at, updated_at')
            .order('year_month', { ascending: false });
          if (!error && data) {
            const formatted = data.map(r => {
              const [y, m] = r.year_month.split('-');
              return { ...r, label: `Tháng ${m}/${y}` };
            });
            setMonthlyArchives(formatted);
          }
        } catch (e) { console.error(e); }
      };

      useEffect(() => {
        fetchSavedSessions();
        fetchMonthlyArchives();
      }, []);

      // Auto-save debounce (10s)
      useEffect(() => {
        if (!isDirty || !supabaseClient || dfCheckDetail.length === 0) return;
        const timer = setTimeout(() => {
          handleSaveSession(false);
        }, 10000);
        return () => clearTimeout(timer);
      }, [isDirty, dfCheckDetail, dfCountL2]);

      // --- RECONCILIATION ALGORITHM ---
      const handleProcessFiles = (stockRowsRaw, erpRowsRaw) => {
        if (!stockRowsRaw || stockRowsRaw.length === 0 || !erpRowsRaw || erpRowsRaw.length === 0) {
          alert("Vui lòng tải lên cả 2 file trước khi bấm đối soát!");
          return;
        }

        const stockRows = stockRowsRaw.map(r => {
          const sku = findVal(r, skuCandidates);
          const name = findVal(r, nameCandidates, "Chưa có tên");
          const serial = findVal(r, serialCandidates, "", ['loại serial', 'loại hàng']);
          const qty = parseInt(findVal(r, qtyCandidates, "1")) || 1;
          const bin = findVal(r, binCandidates);
          const uom = findVal(r, uomCandidates, "Cái");
          const type = findVal(r, typeCandidates, "Hàng bán");
          return { sku, name, serial, qty, bin, uom, type };
        }).filter(r => r.sku);

        // FILTER ERP ROWS: ONLY INCLUDE ROWS WHERE "Số lượng kiểm đếm" > 0!
        const erpRows = erpRowsRaw.map(r => {
          const sku = findVal(r, skuCandidates);
          const serial = findVal(r, serialCandidates, "", ['loại serial', 'loại hàng']);
          const bin = findVal(r, binCandidates);
          const qtyValStr = findVal(r, qtyCandidates, "1");
          const qty = parseFloat(qtyValStr) || 0;
          return { sku, serial, bin, qty };
        }).filter(r => r.sku && r.qty > 0); // EXCLUDE UNSCANNED PLACEHOLDERS WHERE QTY IS 0.00!

        if (stockRows.length === 0 || erpRows.length === 0) {
          alert("Không khớp được cột SKU/Mã sản phẩm trên 2 file. Vui lòng kiểm tra lại file!");
          return;
        }

        const erpItemsBySku = {};
        const erpQtyBySku = {};
        const serialSkusSet = new Set();

        erpRows.forEach(r => {
          if (!erpQtyBySku[r.sku]) erpQtyBySku[r.sku] = 0;
          erpQtyBySku[r.sku] += r.qty;
          if (r.serial) {
            serialSkusSet.add(r.sku);
            if (!erpItemsBySku[r.sku]) erpItemsBySku[r.sku] = [];
            erpItemsBySku[r.sku].push({ serial: r.serial, bin: r.bin });
          }
        });

        stockRows.forEach(r => {
          if (r.serial) serialSkusSet.add(r.sku);
        });

        const stockQtyBySku = {};
        const stockNameBySku = {};
        const stockUomBySku = {};

        stockRows.forEach(r => {
          if (!stockQtyBySku[r.sku]) {
            stockQtyBySku[r.sku] = 0;
            stockNameBySku[r.sku] = r.name;
            stockUomBySku[r.sku] = r.uom;
          }
          stockQtyBySku[r.sku] += r.qty;
        });

        const allSkus = Array.from(new Set([...Object.keys(stockQtyBySku), ...Object.keys(erpQtyBySku)]));

        const countL2Data = allSkus.map(sku => {
          const name = stockNameBySku[sku] || "Sản phẩm mới chưa có trong danh mục";
          const uom = stockUomBySku[sku] || "Cái";
          const qtySys = stockQtyBySku[sku] || 0;
          let qtyL1 = 0;
          if (serialSkusSet.has(sku)) {
            qtyL1 = (erpItemsBySku[sku] || []).length;
          } else {
            qtyL1 = erpQtyBySku[sku] || 0;
          }
          return {
            sku,
            name,
            uom,
            qtySys,
            qtyL1,
            qtyL2: 0,
            diffL2: qtyL1 - qtySys,
            totalActual: qtyL1,
            note: ""
          };
        });

        const detailRows = [];
        const stockRowsBySku = {};

        stockRows.forEach(r => {
          if (!stockRowsBySku[r.sku]) stockRowsBySku[r.sku] = [];
          const isNonSerial = !serialSkusSet.has(r.sku);
          stockRowsBySku[r.sku].push({
            sku: r.sku,
            name: r.name,
            uom: r.uom,
            qty: isNonSerial ? r.qty : 1,
            stockSerial: isNonSerial ? "(Hàng không serial)" : r.serial,
            scannedSerial: "",
            bin: r.bin,
            type: isNonSerial ? "Hàng không serial" : r.type,
            checked: 0,
            diff: -(isNonSerial ? r.qty : 1),
            status: "Bắn thiếu (Chưa quét)",
            note: "",
            isNonSerial
          });
        });

        allSkus.forEach(sku => {
          const sRows = stockRowsBySku[sku] || [];
          const isSerial = serialSkusSet.has(sku);

          if (!isSerial) {
            const totalErp = erpQtyBySku[sku] || 0;
            let remErp = totalErp;
            sRows.forEach((r, idx) => {
              const sysQ = r.qty;
              let alloc = remErp >= sysQ ? sysQ : remErp;
              remErp -= alloc;
              if (idx === sRows.length - 1 && remErp > 0) {
                alloc += remErp;
                remErp = 0;
              }
              const diffQ = alloc - sysQ;
              detailRows.push({
                ...r,
                scannedSerial: alloc > 0 ? `${alloc} cái` : "0 cái",
                checked: alloc,
                diff: diffQ,
                status: diffQ === 0 ? `Đã đếm đủ (${alloc}/${sysQ})` : (diffQ < 0 ? `Bắn thiếu ${Math.abs(diffQ)} hàng (${alloc}/${sysQ})` : `Bắn thừa ${diffQ} hàng (${alloc}/${sysQ})`)
              });
            });
            if (sRows.length === 0 && totalErp > 0) {
              detailRows.push({
                sku, name: "Sản phẩm không serial chưa có trong danh mục", uom: "Cái", qty: 0,
                stockSerial: "(Hàng không serial)", scannedSerial: `Đã đếm: ${totalErp}`, bin: "",
                type: "Không có tồn hệ thống", checked: totalErp, diff: totalErp, status: `Bắn thừa hàng ${totalErp}`, note: ""
              });
            }
          } else {
            const eItems = [...(erpItemsBySku[sku] || [])];
            const matchedSerialsSet = new Set();
            
            // 1. Exact match by serial number
            sRows.forEach(r => {
              const matchedIdx = eItems.findIndex(e => e.serial === r.stockSerial);
              if (r.stockSerial && matchedIdx !== -1) {
                const matched = eItems.splice(matchedIdx, 1)[0];
                r.scannedSerial = matched.serial;
                r.bin = matched.bin || r.bin;
                r.checked = 1;
                r.diff = 0;
                r.status = "Đã quét đủ";
                matchedSerialsSet.add(matched.serial);
              }
            });

            // 2. Unmatched stock rows paired with unmatched scanned serials -> Bắn sai serial!
            sRows.forEach(r => {
              if (r.checked === 0) {
                if (eItems.length > 0) {
                  const wrongItem = eItems.shift();
                  r.scannedSerial = wrongItem.serial;
                  r.bin = wrongItem.bin || r.bin;
                  r.checked = 1;
                  r.diff = 0;
                  r.status = "Bắn sai serial";
                } else {
                  r.scannedSerial = "";
                  r.checked = 0;
                  r.diff = -1;
                  r.status = "Bắn thiếu (Chưa quét)";
                }
              }
              detailRows.push(r);
            });

            // 3. Extra scanned serials -> Bắn dư serial
            if (eItems.length > 0) {
              const firstName = sRows.length > 0 ? sRows[0].name : "Sản phẩm quét dư / chưa có trong danh mục";
              const firstUom = sRows.length > 0 ? sRows[0].uom : "Cái";
              eItems.forEach(extraItem => {
                const isDupScan = matchedSerialsSet.has(extraItem.serial);
                const statusStr = isDupScan ? "Bắn dư (Quét trùng Serial)" : "Bắn dư serial";
                const noteStr = isDupScan ? `[Quét trùng Serial ${extraItem.serial} đã kiểm ở Bin khác]` : "";

                detailRows.push({
                  sku, name: firstName, uom: firstUom, qty: 1, stockSerial: "", scannedSerial: extraItem.serial, bin: extraItem.bin || "",
                  type: sRows.length > 0 ? "Bắn dư serial" : "Không có tồn hệ thống", checked: 1, diff: 1, status: statusStr, note: noteStr
                });
              });
            }
          }
        });

        setDfCountL2(countL2Data);
        setDfCheckDetail(detailRows);
        setIsDirty(true);
        setActiveTab(1);
      };

      // --- SAVE & LOAD SESSIONS ---
      const handleSaveSession = async (showNotice = true) => {
        if (!supabaseClient || dfCheckDetail.length === 0) return;
        try {
          const payload = {
            df_count_l2: dfCountL2,
            df_check_detail: dfCheckDetail,
          };
          const rowData = {
            session_name: sessionName.trim() || "Đợt kiểm kê chưa đặt tên",
            data: payload
          };
          if (activeSessionId) rowData.id = activeSessionId;

          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .upsert(rowData)
            .select();

          if (!error && data && data.length > 0) {
            setActiveSessionId(data[0].id);
            setLastSavedTime(new Date().toLocaleTimeString('vi-VN'));
            setIsDirty(false);
            fetchSavedSessions();
            if (showNotice) alert("✅ Đã lưu thành công đợt kiểm kê lên Supabase!");
          }
        } catch (e) { alert("Lỗi khi lưu Supabase: " + e.message); }
      };

      const handleLoadSession = async (id) => {
        if (!supabaseClient) return;
        try {
          const { data, error } = await supabaseClient
            .from('inventory_sessions')
            .select('*')
            .eq('id', id)
            .single();

          if (!error && data) {
            const p = data.data || {};
            setDfCountL2(p.df_count_l2 || []);
            setDfCheckDetail(p.df_check_detail || []);
            setActiveSessionId(data.id);
            setSessionName(data.session_name || '');
            setLastSavedTime(new Date(data.updated_at).toLocaleTimeString('vi-VN'));
            setIsDirty(false);
          }
        } catch (e) { alert("Lỗi tải đợt kiểm kê: " + e.message); }
      };

      // --- MONTHLY ARCHIVE SAVE ---
      const handleSaveMonthlyArchive = async () => {
        if (!supabaseClient || dfCountL2.length === 0) return;
        try {
          const ym = `${archiveYear}-${String(archiveMonth).padStart(2, '0')}`;
          let label = `Tháng ${String(archiveMonth).padStart(2, '0')}/${archiveYear}`;
          if (archiveLabel.trim()) label += ` — ${archiveLabel.trim()}`;

          const summaryData = dfCountL2.map(r => ({
            SKU: r.sku,
            'Tên hàng hóa': r.name,
            'ĐVT': r.uom,
            'Số lượng sổ sách': r.qtySys,
            'Số lượng thực tế': r.totalActual,
            'Chênh lệch': r.totalActual - r.qtySys
          }));

          const payload = {
            year_month: ym,
            summary: { data: summaryData, _label: label },
            df_count_l2: dfCountL2,
            df_detail: dfCheckDetail
          };

          const { error } = await supabaseClient
            .from('monthly_archives')
            .upsert(payload, { onConflict: 'year_month' });

          if (!error) {
            alert(`✅ Đã lưu báo cáo ${label} thành công!`);
            fetchMonthlyArchives();
          } else { alert("Lỗi lưu archive: " + error.message); }
        } catch (e) { alert("Lỗi: " + e.message); }
      };

      // --- INLINE EDITING HANDLERS ---
      const handleL2QtyChange = (sku, val) => {
        const num = parseInt(val) || 0;
        setDfCountL2(prev => prev.map(r => {
          if (r.sku === sku) {
            const totalActual = r.qtyL1 + num;
            const diffL2 = totalActual - r.qtySys;
            return { ...r, qtyL2: num, totalActual, diffL2 };
          }
          return r;
        }));
        setIsDirty(true);
      };

      const handleL2NoteChange = (sku, note) => {
        setDfCountL2(prev => prev.map(r => r.sku === sku ? { ...r, note } : r));
        setIsDirty(true);
      };

      const handleSerialEdit = (idx, newSerial) => {
        setDfCheckDetail(prev => {
          const updated = [...prev];
          const row = updated[idx];
          const oldSerial = row.scannedSerial;
          if (newSerial === "" && (row.status.includes("Bắn dư") || oldSerial !== "")) {
            setPendingClearSerial({ idx, sku: row.sku, serial: oldSerial });
            return prev;
          }
          row.scannedSerial = newSerial;
          row.checked = newSerial ? 1 : 0;
          row.diff = newSerial ? 0 : -1;
          row.status = newSerial ? "Đã sửa Serial (Lần 2)" : "Bắn thiếu (Chưa quét)";
          row.note = `${row.note} [Sửa Serial: ${oldSerial} -> ${newSerial}]`.trim();
          return updated;
        });
        setIsDirty(true);
      };

      const confirmClearSurplusSerial = () => {
        if (!clearReasonInput.trim() || !pendingClearSerial) {
          alert("Vui lòng nhập lý do loại bỏ!");
          return;
        }
        const { idx, sku, serial } = pendingClearSerial;
        setDfCheckDetail(prev => {
          const updated = [...prev];
          const r = updated[idx];
          r.scannedSerial = "";
          r.checked = 0;
          r.diff = 0;
          r.status = "Đã loại bỏ Serial dư";
          r.note = `[Đã loại bỏ Serial dư ${serial} - Lý do: ${clearReasonInput.trim()}]`;
          return updated;
        });

        setDfCountL2(prev => prev.map(r => r.sku === sku ? { ...r, qtyL1: Math.max(0, r.qtyL1 - 1), totalActual: Math.max(0, r.totalActual - 1), diffL2: Math.max(0, r.totalActual - 1) - r.qtySys } : r));

        setPendingClearSerial(null);
        setClearReasonInput("");
        setIsDirty(true);
      };

      // --- EXPORT HANDLERS ---
      const handleExportExcel = () => {
        if (dfCountL2.length === 0) return;
        const wb = XLSX.utils.book_new();

        const summaryRows = dfMainRows.map((r, i) => ({
          'STT': i + 1,
          'SKU': r.sku,
          'Tên hàng hóa': r.name,
          'Đơn vị tính': r.uom,
          'Số lượng sổ sách (hệ thống)': r.qtySys,
          'Số lượng thực tế': r.totalActual,
          'Chênh lệch': r.diff,
          'Check': r.chkStatus,
          'Ghi chú/ Tình trạng hàng hóa': r.note
        }));
        const wsSummary = XLSX.utils.json_to_sheet(summaryRows);
        XLSX.utils.book_append_sheet(wb, wsSummary, "TH-HANG HOA");

        const l2Rows = dfCountL2.map(r => ({
          'Mã vật tư': r.sku,
          'Tên vật tư': r.name,
          'Đvt': r.uom,
          'Số lượng sổ sách (hệ thống)': r.qtySys,
          'Số liệu thực tế đã đếm lần 1': r.qtyL1,
          'Số liệu thực tế đếm lại lần 2': r.qtyL2,
          'Chênh lệch sau kiểm đếm lần 2': r.diffL2,
          'Kết quả xử lý sau khi đếm lại lần 2': r.totalActual,
          'Note mã đơn': r.note
        }));
        const wsL2 = XLSX.utils.json_to_sheet(l2Rows);
        XLSX.utils.book_append_sheet(wb, wsL2, "Kiểm đếm lần 2");

        const checkRows = dfCheckDetail.map(r => ({
          'Mã sản phẩm': r.sku,
          'Tên sản phẩm': r.name,
          'Part number': r.part || "",
          'ĐVT': r.uom,
          'Số lượng': r.qty,
          'Số Serial': r.stockSerial,
          'Serial đã quét': r.scannedSerial,
          'Mã Bin': r.bin,
          'Tên Bin': r.bin,
          'Loại hàng': r.type,
          'Đã kiểm': r.checked,
          'Dư/Thiếu': r.diff,
          'Check đơn': r.status,
          'Note đơn hàng': r.note
        }));
        const wsDetail = XLSX.utils.json_to_sheet(checkRows);
        XLSX.utils.book_append_sheet(wb, wsDetail, "check");

        XLSX.writeFile(wb, `Bien_Ban_Kiem_Ke_Hang_Ton_Kho_${reportDate.replace(/-/g, '')}.xlsx`);
      };

      const handleExportPDF = () => {
        if (dfMainRows.length === 0) return;
        
        const tableBody = [
          [
            { text: 'STT', style: 'tableHeader' },
            { text: 'SKU', style: 'tableHeader' },
            { text: 'Tên hàng hóa', style: 'tableHeader' },
            { text: 'ĐVT', style: 'tableHeader' },
            { text: 'Sổ sách', style: 'tableHeader' },
            { text: 'Thực tế', style: 'tableHeader' },
            { text: 'Chênh lệch', style: 'tableHeader' },
            { text: 'Ghi chú / Tình trạng', style: 'tableHeader' }
          ]
        ];

        let totSys = 0;
        let totAct = 0;
        let totDiff = 0;

        dfMainRows.forEach((r, idx) => {
          totSys += r.qtySys;
          totAct += r.totalActual;
          totDiff += r.diff;

          const diffText = r.diff < 0 ? `(${Math.abs(r.diff)})` : (r.diff === 0 ? '-' : `${r.diff}`);
          
          tableBody.push([
            { text: `${idx + 1}`, alignment: 'center' },
            { text: r.sku, alignment: 'left' },
            { text: r.name, alignment: 'left' },
            { text: r.uom, alignment: 'center' },
            { text: `${r.qtySys}`, alignment: 'right' },
            { text: `${r.totalActual}`, alignment: 'right' },
            { text: diffText, alignment: 'right', color: r.diff !== 0 ? '#cc0000' : '#000000', bold: r.diff !== 0 },
            { text: r.note || '-', alignment: 'left' }
          ]);
        });

        tableBody.push([
          { text: 'Tổng cộng', bold: true, color: '#cc0000', colSpan: 4, alignment: 'left' },
          {}, {}, {},
          { text: `${totSys}`, bold: true, color: '#cc0000', alignment: 'right' },
          { text: `${totAct}`, bold: true, color: '#cc0000', alignment: 'right' },
          { text: totDiff < 0 ? `(${Math.abs(totDiff)})` : `${totDiff}`, bold: true, color: '#cc0000', alignment: 'right' },
          { text: '', alignment: 'left' }
        ]);

        const docDefinition = {
          pageSize: 'A4',
          pageOrientation: 'landscape',
          pageMargins: [20, 20, 20, 20],
          content: [
            { text: 'PHONGVU.VN', style: 'brandHeader' },
            { text: 'CÔNG TY CỔ PHẦN THƯƠNG MẠI DỊCH VỤ PHONG VŨ', style: 'companyName' },
            { text: 'BIÊN BẢN KIỂM KÊ HÀNG TỒN KHO', style: 'pdfTitle' },
            { text: `NGÀY ${reportDate.split('-').reverse().join('.')}`, style: 'pdfSubtitle' },
            { text: '\n' },
            { text: `Tại kho: ${locationName}`, style: 'metaText' },
            { text: `Họ tên: ${mgrName} — Chức danh: Quản lý Đơn vị`, style: 'metaText' },
            { text: `Họ tên: ${staffName} — Chức danh: Đại diện Kiểm kê / Kho`, style: 'metaText' },
            { text: '\n' },
            {
              table: {
                headerRows: 1,
                widths: [25, 70, 240, 35, 60, 60, 60, 180],
                body: tableBody
              },
              layout: {
                fillColor: function (rowIndex) { return (rowIndex === 0) ? '#D9E1F2' : null; }
              }
            },
            { text: '\n\n' },
            {
              table: {
                widths: ['25%', '25%', '25%', '25%'],
                body: [
                  [
                    { text: 'Đại diện Kho\n(Ký, ghi rõ họ tên)', alignment: 'center', bold: true },
                    { text: 'Đại diện kiểm kê\n(Ký, ghi rõ họ tên)', alignment: 'center', bold: true },
                    { text: 'Quản lý Đơn vị\n(Ký, ghi rõ họ tên)', alignment: 'center', bold: true },
                    { text: 'Kiểm soát nội bộ\n(Ký, ghi rõ họ tên)', alignment: 'center', bold: true }
                  ]
                ]
              },
              layout: 'noBorders'
            }
          ],
          styles: {
            brandHeader: { fontSize: 12, bold: true, color: '#003399' },
            companyName: { fontSize: 9, color: '#555555' },
            pdfTitle: { fontSize: 16, bold: true, alignment: 'center', margin: [0, 5, 0, 2] },
            pdfSubtitle: { fontSize: 11, bold: true, color: '#cc0000', alignment: 'center' },
            metaText: { fontSize: 9, margin: [0, 2, 0, 2] },
            tableHeader: { fontSize: 9, bold: true, alignment: 'center' }
          },
          defaultStyle: { fontSize: 8 }
        };

        pdfMake.createPdf(docDefinition).download(`Bien_Ban_Kiem_Ke_Hang_Ton_Kho_${reportDate.replace(/-/g, '')}.pdf`);
      };

      // --- DERIVED TAB 4 SUMMARY ROWS ---
      const dfMainRows = useMemo(() => {
        if (dfCountL2.length === 0 || dfCheckDetail.length === 0) return [];

        const wrongSerialSkus = new Set(dfCheckDetail.filter(r => r.status === 'Bắn sai serial').map(r => r.sku));
        const surplusSkus = new Set(dfCheckDetail.filter(r => r.status.includes('Bắn dư')).map(r => r.sku));

        const detailNotesBySku = {};
        dfCheckDetail.forEach(r => {
          if (r.note) {
            if (!detailNotesBySku[r.sku]) detailNotesBySku[r.sku] = [];
            if (!detailNotesBySku[r.sku].includes(r.note)) detailNotesBySku[r.sku].push(r.note);
          }
        });

        return dfCountL2.map(r => {
          const sku = r.sku;
          const name = r.name;
          const uom = r.uom;
          const qtySys = r.qtySys;
          const qtyL1 = r.qtyL1;
          const qtyL2 = r.qtyL2;
          const totalActual = qtyL1 + qtyL2;
          const diff = totalActual - qtySys;

          const l2Note = r.note || "";
          const dtNote = (detailNotesBySku[sku] || []).join(" | ");
          const combinedNote = [dtNote, l2Note].filter(Boolean).join(" | ");

          let chkStatus = "Khớp hoàn toàn";
          if (wrongSerialSkus.has(sku)) chkStatus = "Bắn sai serial";
          else if (surplusSkus.has(sku)) chkStatus = "Bắn dư serial";
          else if (qtySys > qtyL1 && totalActual === qtySys) chkStatus = "Bắn thiếu hàng - Kiểm lần 2 đủ";
          else if (qtySys > qtyL1 && totalActual < qtySys) chkStatus = `Bắn thiếu hàng - Kiểm lần 2 thiếu ${Math.abs(diff)}`;
          else if (totalActual < qtySys) chkStatus = "Bắn thiếu hàng";
          else if (totalActual > qtySys) chkStatus = `Bắn thừa hàng ${diff}`;

          return {
            sku, name, uom, qtySys, qtyL1, qtyL2, totalActual, diff, chkStatus, note: combinedNote
          };
        });
      }, [dfCountL2, dfCheckDetail]);

      // Filtered Views
      const filteredDetailRows = useMemo(() => {
        return dfCheckDetail.filter(r => {
          if (filterDetailStatus === "Chỉ Serial chênh lệch (Dư / Thiếu)" && r.diff === 0 && r.status === "Đã quét đủ") return false;
          if (filterDetailStatus === "Thiếu (Chưa quét)" && r.status !== "Bắn thiếu (Chưa quét)") return false;
          if (filterDetailStatus === "Bắn sai serial" && r.status !== "Bắn sai serial") return false;
          if (filterDetailStatus === "Bắn dư serial" && !r.status.includes("Bắn dư")) return false;
          if (filterDetailStatus === "Đã loại bỏ Serial dư" && r.status !== "Đã loại bỏ Serial dư") return false;

          if (searchDetail.trim()) {
            const kw = searchDetail.toLowerCase();
            return r.sku.toLowerCase().includes(kw) || r.name.toLowerCase().includes(kw) || (r.stockSerial && r.stockSerial.toLowerCase().includes(kw)) || (r.scannedSerial && r.scannedSerial.toLowerCase().includes(kw));
          }
          return true;
        });
      }, [dfCheckDetail, filterDetailStatus, searchDetail]);

      const filteredL2Rows = useMemo(() => {
        return dfCountL2.filter(r => {
          if (filterL2Mode.startsWith("Chỉ SKU") && r.diffL2 === 0 && r.qtyL2 === 0) return false;
          if (filterL2Status === "Lệch chưa đếm bù" && (r.diffL2 === 0 || r.qtyL2 > 0)) return false;
          if (filterL2Status === "Đã nhập đếm bù Lần 2" && r.qtyL2 === 0) return false;
          if (filterL2Status === "Đã khớp sau đếm bù" && r.diffL2 !== 0) return false;

          if (searchL2.trim()) {
            const kw = searchL2.toLowerCase();
            return r.sku.toLowerCase().includes(kw) || r.name.toLowerCase().includes(kw);
          }
          return true;
        });
      }, [dfCountL2, filterL2Mode, filterL2Status, searchL2]);

      const filteredMainRows = useMemo(() => {
        return dfMainRows.filter(r => {
          if (filterMainMode.startsWith("Chỉ SKU") && r.chkStatus === "Khớp hoàn toàn") return false;
          if (filterMainStatus === "Bắn sai serial" && r.chkStatus !== "Bắn sai serial") return false;
          if (filterMainStatus === "Bắn dư serial" && !r.chkStatus.includes("Bắn dư")) return false;
          if (filterMainStatus === "Bắn thừa hàng" && !r.chkStatus.includes("Bắn thừa")) return false;
          if (filterMainStatus === "Bắn thiếu hàng" && !r.chkStatus.includes("Bắn thiếu")) return false;
          if (filterMainStatus === "Khớp hoàn toàn" && r.chkStatus !== "Khớp hoàn toàn") return false;

          if (searchMain.trim()) {
            const kw = searchMain.toLowerCase();
            return r.sku.toLowerCase().includes(kw) || r.name.toLowerCase().includes(kw);
          }
          return true;
        });
      }, [dfMainRows, filterMainMode, filterMainStatus, searchMain]);

      return (
        <div className="flex h-screen overflow-hidden">
          {/* SIDEBAR */}
          <aside className="w-80 bg-slate-900 text-slate-100 flex flex-col justify-between p-4 shadow-xl overflow-y-auto">
            <div>
              <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-800">
                <div className="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center font-bold text-lg text-white shadow-lg">PV</div>
                <div>
                  <h1 className="font-bold text-sm leading-tight text-slate-100">Phong Vũ Inventory</h1>
                  <p className="text-xs text-slate-400">Reconciliation Web App</p>
                </div>
              </div>

              {/* CURRENT SESSION HEADER */}
              <div className="mb-6 space-y-3">
                <label className="text-xs font-semibold uppercase tracking-wider text-slate-400">Đợt kiểm kê hiện tại</label>
                <input
                  type="text"
                  value={sessionName}
                  onChange={e => { setSessionName(e.target.value); setIsDirty(true); }}
                  className="w-full bg-slate-800 text-slate-100 px-3 py-2 rounded-lg text-sm border border-slate-700 focus:outline-none focus:border-brand-500"
                />
                
                <button
                  onClick={() => handleSaveSession(true)}
                  disabled={dfCheckDetail.length === 0}
                  className={`w-full py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 transition ${isDirty ? 'bg-amber-500 hover:bg-amber-600 text-slate-950' : 'bg-brand-600 hover:bg-brand-700 text-white'} disabled:opacity-40`}
                >
                  💾 {isDirty ? 'Lưu đợt hiện tại ●' : 'Lưu đợt hiện tại'}
                </button>

                {lastSavedTime && (
                  <p className="text-xs text-slate-400 text-center">Đã lưu lúc: {lastSavedTime} {isDirty && '(có thay đổi)'}</p>
                )}
              </div>

              {/* HISTORY LIST */}
              <div className="mb-6 space-y-2">
                <label className="text-xs font-semibold uppercase tracking-wider text-slate-400">Lịch sử Supabase</label>
                <div className="space-y-1 max-h-40 overflow-y-auto pr-1">
                  {savedSessions.map(s => (
                    <div
                      key={s.id}
                      onClick={() => handleLoadSession(s.id)}
                      className={`p-2 rounded-lg text-xs cursor-pointer transition flex justify-between items-center ${activeSessionId === s.id ? 'bg-brand-600 text-white font-medium' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}
                    >
                      <span className="truncate max-w-[170px]">{s.session_name}</span>
                      <span className="text-[10px] opacity-70">{new Date(s.updated_at).toLocaleDateString('vi-VN')}</span>
                    </div>
                  ))}
                  {savedSessions.length === 0 && <p className="text-xs text-slate-500 italic">Chưa có lịch sử lưu.</p>}
                </div>
              </div>

              {/* MONTHLY ARCHIVES SECTION */}
              <div className="pt-4 border-t border-slate-800 space-y-3">
                <label className="text-xs font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                  📅 Lưu trữ 12 tháng
                </label>
                
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <span className="text-[11px] text-slate-400 block mb-1">Tháng:</span>
                    <select
                      value={archiveMonth}
                      onChange={e => setArchiveMonth(parseInt(e.target.value))}
                      className="w-full bg-slate-800 text-slate-200 px-2 py-1.5 rounded text-xs border border-slate-700"
                    >
                      {Array.from({length: 12}, (_, i) => i + 1).map(m => (
                        <option key={m} value={m}>Tháng {String(m).padStart(2,'0')}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <span className="text-[11px] text-slate-400 block mb-1">Năm:</span>
                    <select
                      value={archiveYear}
                      onChange={e => setArchiveYear(parseInt(e.target.value))}
                      className="w-full bg-slate-800 text-slate-200 px-2 py-1.5 rounded text-xs border border-slate-700"
                    >
                      {[2024, 2025, 2026, 2027].map(y => (
                        <option key={y} value={y}>{y}</option>
                      ))}
                    </select>
                  </div>
                </div>

                <input
                  type="text"
                  placeholder="Nhãn (VD: Khánh Hội...)"
                  value={archiveLabel}
                  onChange={e => setArchiveLabel(e.target.value)}
                  className="w-full bg-slate-800 text-slate-200 px-2.5 py-1.5 rounded text-xs border border-slate-700"
                />

                <button
                  onClick={handleSaveMonthlyArchive}
                  disabled={dfCountL2.length === 0}
                  className="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-xs font-semibold transition disabled:opacity-40"
                >
                  📦 Lưu báo cáo tháng này
                </button>
              </div>
            </div>

            <div className="pt-4 border-t border-slate-800 text-center">
              <span className="text-[11px] text-slate-500">Antigravity Web App v2.0</span>
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col overflow-hidden bg-slate-50">
            {/* TOP NAVIGATION TABS */}
            <header className="bg-white border-b border-slate-200 px-6 pt-4 pb-0 shadow-sm">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h2 className="text-xl font-bold text-slate-800">Hệ thống Tự động Xử lý & Đối soát Dữ liệu Kiểm kê</h2>
                  <p className="text-xs text-slate-500">Công ty Cổ phần Thương mại Dịch vụ Phong Vũ</p>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={handleExportExcel}
                    disabled={dfCountL2.length === 0}
                    className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded-lg shadow-sm transition flex items-center gap-2 disabled:opacity-40"
                  >
                    📥 Xuất Excel (3 Sheets)
                  </button>
                  <button
                    onClick={handleExportPDF}
                    disabled={dfMainRows.length === 0}
                    className="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold rounded-lg shadow-sm transition flex items-center gap-2 disabled:opacity-40"
                  >
                    📄 Xuất PDF Biên Bản
                  </button>
                </div>
              </div>

              {/* TABS HEADER */}
              <div className="flex gap-2 border-b border-slate-200">
                {[
                  "1. Nhập dữ liệu",
                  "2. Chi tiết Serial",
                  "3. Kiểm đếm Lần 2",
                  "4. Bảng tổng hợp chênh lệch",
                  "5. Xuất báo cáo",
                  "📅 6. Lưu trữ hàng tháng"
                ].map((tabLabel, idx) => (
                  <button
                    key={idx}
                    onClick={() => setActiveTab(idx)}
                    className={`px-4 py-2.5 text-xs font-semibold transition border-b-2 -mb-px ${activeTab === idx ? 'border-brand-600 text-brand-600 bg-brand-50/50' : 'border-transparent text-slate-600 hover:text-slate-900 hover:border-slate-300'}`}
                  >
                    {tabLabel}
                  </button>
                ))}
              </div>
            </header>

            {/* TAB CONTENTS */}
            <div className="flex-1 p-6 overflow-y-auto">
              
              {/* TAB 0: NHẬP DỮ LIỆU */}
              {activeTab === 0 && (
                <div className="space-y-6 max-w-4xl mx-auto">
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">

                        className="py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold text-xs rounded-xl shadow-md transition"
                      >
                        📄 Tải xuống Biên Bản PDF Chuẩn Phong Vũ
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB 5: LƯU TRỮ HÀNG THÁNG */}
              {activeTab === 5 && (
                <div className="space-y-4 max-w-4xl mx-auto">
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 className="text-base font-bold text-slate-800 mb-2">📅 Danh sách Báo cáo Hàng tháng (Rolling 12 tháng)</h3>
                    <p className="text-xs text-slate-500 mb-4">Lưu trữ snapshot báo cáo tổng hợp cuối tháng trên Supabase.</p>

                    <div className="space-y-2">
                      {monthlyArchives.map(a => (
                        <div key={a.id} className="p-3 bg-slate-50 border border-slate-200 rounded-lg flex justify-between items-center text-xs">
                          <div>
                            <h4 className="font-bold text-slate-800">{a.label}</h4>
                            <p className="text-slate-400">Cập nhật: {new Date(a.updated_at).toLocaleString('vi-VN')}</p>
                          </div>
                          <button
                            onClick={() => alert(`Đang tải báo cáo tháng ${a.label}...`)}
                            className="px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold rounded shadow-sm"
                          >
                            Tải báo cáo
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
